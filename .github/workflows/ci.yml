name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release-check:
    name: Release checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release readiness check
        run: npm run release:check

      - name: GitHub Pages build check
        run: npm run qa:pages
